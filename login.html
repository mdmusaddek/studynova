<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NovaOS Lite | Login</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="login.css">

</head>

<body>

<div class="background"></div>

<div class="glass-card">

<div class="logo">

<h1>NovaOS Lite</h1>

<p>Your Personal AI Operating System</p>

</div>

<div id="registerFields">

<input
type="text"
id="name"
placeholder="Full Name">

</div>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
id="mainButton">

Create Account

</button>

<p
class="switch">

Already have an account?

<span
id="toggleMode">

Login

</span>

</p>

<button
class="guest"
id="guestBtn">

Continue as Guest

</button>

<p
id="status"></p>

</div>

<script src="login.js"></script>

</body>

</html>
